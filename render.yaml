services:
  # PostgreSQL Database
  - type: pserv
    name: pln-postgres
    runtime: docker
    dockerfilePath: ./infra/docker/Dockerfile.postgres
    plan: standard
    envVars:
      - key: POSTGRES_USER
        value: pln_user
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: pln_db
    disk:
      name: postgres-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 10

  # API Server
  - type: web
    name: pln-api
    runtime: rust
    rootDir: services/api
    buildCommand: cargo build --release
    startCommand: ./target/release/api
    plan: standard
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pln-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 10000
      - key: RUST_LOG
        value: info
    healthCheckPath: /graphql
    autoDeploy: true